name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and release macOS arm64
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Swift version
        run: swift --version

      - name: Build release binary
        run: swift build -c release --product kiro-bridge

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/release/kiro-bridge
          generate_release_notes: true
